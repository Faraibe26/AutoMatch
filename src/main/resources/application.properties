# AutoMatch AI - Application Configuration
# Spring Boot Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=automatch-ai

# Database Configuration (H2 for development, PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL (Uncomment for production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/automatch_ai
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Hibernate (Uncomment for production)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=automatch_ai_super_secret_key_for_jwt_authentication_2026_with_minimum_512_bits_length_required_for_hs512_algorithm_to_ensure_proper_security_and_compliance_with_rfc_standards_for_cryptographic_operations
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.automatch=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
